<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="game-shell">
    <h1>Snake</h1>
    <section class="hud" aria-label="Game status">
      <p>Score: <span id="score">0</span></p>
      <p id="status">Running</p>
    </section>

    <section class="actions" aria-label="Game actions">
      <button id="pause-btn" type="button">Pause</button>
      <button id="restart-btn" type="button">Restart</button>
    </section>

    <section class="board-wrap" aria-label="Snake board">
      <div id="board" class="board" role="grid" aria-label="Snake grid"></div>
    </section>

    <section class="controls" aria-label="Touch controls">
      <button data-dir="up" type="button" aria-label="Move up">↑</button>
      <div class="controls-row">
        <button data-dir="left" type="button" aria-label="Move left">←</button>
        <button data-dir="down" type="button" aria-label="Move down">↓</button>
        <button data-dir="right" type="button" aria-label="Move right">→</button>
      </div>
    </section>

    <p class="help">Move: Arrow keys or WASD. Pause: Space/P.</p>
  </main>

  <script src="./snake-logic.js"></script>
  <script src="./snake-ui.js"></script>
</body>
</html>
